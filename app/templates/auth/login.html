<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in | MemberMatch</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet">
  </head>

  <body class="ra-login-body d-flex align-items-center justify-content-center">

    <div class="ra-login-card">

      <div class="text-center mb-4">
        <span class="ra-logo-badge me-2">MM</span>
        <span class="ra-logo-text" style="color: #0f172a; font-size: 1.15rem;">MemberMatch</span>
        <p class="text-muted small mt-2 mb-0">Secure MDM match-and-merge portal</p>
      </div>

      <h1 class="h5 fw-semibold mb-4 text-center">Sign in</h1>

      <form method="POST" action="#">
        <input type="hidden" name="csrf_token" value="">

        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input
            type="text"
            class="form-control"
            id="username"
            name="username"
            autocomplete="username"
            required
          >
        </div>

        <div class="mb-4">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            class="form-control"
            id="password"
            name="password"
            autocomplete="current-password"
            required
          >
        </div>

        <div class="d-grid">
          <button type="submit" class="btn ra-btn-primary">Sign in</button>
        </div>
      </form>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
